# ===============================
# Locations - College Romance (v3 Spec)
# ===============================

zones:
  - id: "campus"
    name: "University Campus"
    discovered: true
    accessible: true
    locations:
      - id: "player_room"
        name: "Your Dorm Room"
        type: "private"
        privacy: "high"
        discovered: true
        features: ["bed", "desk", "shower", "closet"]
        # Actions are now defined in nodes for better context

      - id: "dorm_common"
        name: "Dorm Common Room"
        type: "public"
        privacy: "low"
        discovered: true
        features: ["couch", "tv", "vending_machine"]
        connections:
          - to: "player_room"
            type: "hallway"

      - id: "cafeteria"
        name: "Campus Cafeteria"
        type: "public"
        privacy: "low"
        discovered: true
        features: ["food_counter", "tables"]

      - id: "library"
        name: "University Library"
        type: "public"
        privacy: "medium"
        discovered: true
        features: ["study_desks", "silent_floor", "librarian"]

      - id: "lecture_hall"
        name: "Lecture Hall"
        type: "public"
        privacy: "low"
        discovered: true
        features: ["projector", "seating"]

      - id: "gym"
        name: "Campus Gym"
        type: "public"
        privacy: "low"
        discovered: true
        features: ["weights", "treadmills", "showers"]

      - id: "campus_cafe"
        name: "Campus Café"
        type: "public"
        privacy: "low"
        discovered: true
        features: ["barista", "tables", "sofa"]

      - id: "campus_quad"
        name: "Campus Quad"
        type: "public"
        privacy: "low"
        discovered: true
        features: ["benches", "fountain"]

      - id: "emma_room"
        name: "Emma’s Dorm Room"
        type: "private"
        privacy: "high"
        discovered: false
        # Discovery and access are now handled by nodes and events

      - id: "campus_cafe_back"
        name: "Café Back Booth"
        type: "semi_private" # This should be a tag, type is for engine use
        privacy: "medium"
        discovered: true

  - id: "downtown"
    name: "Downtown"
    discovered: false
    accessible: false
    # Discovery and access are now handled by nodes and events
    locations:
      - id: "night_club"
        name: "Pulse Nightclub"
        type: "public"
        privacy: "low"
        discovered: false
        features: ["dance_floor", "bar", "vip_booth"]