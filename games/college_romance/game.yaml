# ===============================
# Game Manifest (game.yaml)
# College Romance — PlotPlay content pack (v3 Spec)
# ===============================

meta:
  id: "college_romance"
  title: "College Romance: Emma Route"
  version: "0.1.0"
  spec_version: "3.1"
  author: "AutoGen"
  content_rating: "explicit"
  tags: ["romance", "college", "slice_of_life", "NSFW", "corruption", "training"]

# --- Starting point of the game ---
start:
  node: "intro_dorm"
  location: { zone: "campus", id: "player_room" }

# --- Default narration style ---
narration:
  pov: "second"
  tense: "present"
  paragraphs: "2-3"
  token_budget: 320
  checker_budget: 220

# --- Model cost profiles ---
model_profiles:
  writer: "cheap"
  checker: "fast"

# --- Global meters ---
meters:
  player:
    energy: { min: 0, max: 100, default: 70, visible: true, icon: "⚡", decay_per_slot: -10 }
    money: { min: 0, max: 9999, default: 60, visible: true, icon: "💵", format: "currency" }
    mind: { min: 0, max: 100, default: 40, visible: true, icon: "🧠" }
    body: { min: 0, max: 100, default: 35, visible: true, icon: "💪" }
    looks: { min: 0, max: 100, default: 45, visible: true, icon: "✨" }
    hygiene: { min: 0, max: 100, default: 60, visible: true, icon: "🧼", decay_per_slot: -5 }

  character_template:
    trust: {
        min: 0, max: 100, default: 10,
        thresholds: { stranger: [0,19], acquaintance: [20,39], friend: [40,69], close: [70,89], intimate: [90,100] }
      }
    attraction: {
      min: 0, max: 100, default: 5,
      thresholds: { none: [0,19], interested: [20,39], attracted: [40,69], infatuated: [70,89], in_love: [90,100] }
    }
    arousal: {
      min: 0, max: 100, default: 0,
      hidden_until: "meters.{character}.attraction >= 30"
    }
    boldness: {
      min: 0, max: 100, default: 20,
      hidden_until: "meters.{character}.trust >= 40"
    }
    corruption: {
      min: 0, max: 100, default: 0
    }

# --- Meter interaction heuristics ---
meter_interactions:
  - source: "player.energy"
    target: "all.arousal"
    when: "source < 25"
    effect: "max = 60"
  - source: "player.hygiene"
    target: "npc.{any}.attraction"
    when: "source < 30"
    effect: "effective_delta_multiplier = 0.5"
  - source: "player.mind"
    target: "emma.trust"
    when: "source >= 60"
    effect: "soft_bonus = +1 on study/date scenes"
  - source: "emma.corruption"
    target: "emma.gates"
    when: "source >= 40"
    effect: "temporarily allow: ['accept_kiss','accept_oral'] (still needs privacy)"

# --- Time system ---
time:
  mode: "slots"
  slots: ["morning", "noon", "afternoon", "night", "late_night"]
  actions_per_slot: 3
  auto_advance: true
  calendar:
    epoch: "2025-09-01"
    week_days: ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"]
    start_day_index: 0
    weeks_enabled: true
  start:
    day: 1
    slot: "morning"

# --- Global action policies (UI/Writer guardrails) ---
action_filters:
  banned_topics: ["minors", "non-consensual acts", "sexualized violence"]
  banned_freeform:
    - { pattern: "drugging", reason: "not allowed in this game" }
    - { pattern: "incest",   reason: "forbidden" }

# --- List of included content files ---
includes:
  - "characters.yaml"
  - "locations.yaml"
  - "nodes.yaml"
  - "events.yaml"
  - "arcs.yaml"
  - "items.yaml"