# ===============================
# Game Manifest (game.yaml)
# Coffee Shop Date - v3 Spec
# ===============================

# This file contains the core metadata and includes other files.
game:
  id: "coffee_test"
  title: "Coffee Shop Date - Test Game"
  version: "1.0.0"
  spec_version: "3.1"
  author: "TestDev"
  content_rating: "teen"
  tags: ["test", "romance", "linear"]

  narration:
    pov: "second"
    tense: "present"
    paragraphs: "1-2"

  meters:
    player:
      confidence: { min: 0, max: 100, default: 50, visible: true, icon: "😎" }
      money: { min: 0, max: 100, default: 20, visible: true, icon: "💵" }

    character_template:
      comfort: {
        min: 0, max: 100, default: 20,
        thresholds: { nervous: [0,30], relaxed: [31,70], comfortable: [71,100] }
      }
      interest: {
        min: 0, max: 100, default: 15,
        thresholds: { polite: [0,30], interested: [31,70], attracted: [71,100] }
      }

  time:
    mode: "slots"
    slots: ["afternoon"]
    actions_per_slot: 10
    auto_advance: false
    start:
      day: 1
      slot: "afternoon"

# Includes: pull in external files and merge their sections.
# Each included file must declare recognized root keys (e.g., characters, nodes, zones).
includes:
  - "characters.yaml"
  - "locations.yaml"
  - "nodes.yaml"
  - "items.yaml"